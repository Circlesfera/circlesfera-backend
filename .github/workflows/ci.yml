name: CI/CD - Backend CircleSfera

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Tests y Linting
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: 📦 Instalar dependencias
        run: npm ci

      - name: 🔍 Linting
        run: npm run lint

      - name: 🧪 Ejecutar tests
        run: npm test -- --coverage --passWithNoTests
        env:
          NODE_ENV: test
          JWT_SECRET: ${{ secrets.JWT_SECRET_TEST || 'test-secret-key-for-ci' }}
          MONGODB_URI: ${{ secrets.MONGODB_URI_TEST || 'mongodb://localhost:27017/circlesfera-test' }}
          REDIS_URL: ${{ secrets.REDIS_URL_TEST || '' }}

      - name: 📊 Upload cobertura a Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          flags: backend
          name: codecov-backend

  security:
    name: Análisis de Seguridad
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: 📦 Instalar dependencias
        run: npm ci

      - name: 🔒 Audit de dependencias
        run: npm audit --audit-level=high

      - name: 🛡️ Análisis de seguridad con Snyk
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN || '' }}
        with:
          command: test

  build:
    name: Build de Producción
    runs-on: ubuntu-latest
    needs: [test, security]

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: 📦 Instalar dependencias
        run: npm ci --production

      - name: ✅ Build exitoso
        run: echo "Build de producción completado"

  notify:
    name: Notificar resultado
    runs-on: ubuntu-latest
    needs: [test, security, build]
    if: always()

    steps:
      - name: 📢 Estado del CI
        run: |
          echo "CI completado"
          echo "Tests: ${{ needs.test.result }}"
          echo "Seguridad: ${{ needs.security.result }}"
          echo "Build: ${{ needs.build.result }}"

